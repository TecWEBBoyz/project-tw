services:
  server:
    image: ubuntu:22.04
    container_name: server_container
    volumes:
      - ./www:/var/www/html
      - ./config/apache/000-default.conf:/000-default.conf
      - ./setup_apache.sh:/setup_apache.sh
    working_dir: /var/www/html
    ports:
      - "8080:80"
      - "3306:3306"
    networks:
      - webnet
    environment:
      DEBIAN_FRONTEND: noninteractive
    command: >
      /bin/bash -c "apt-get update && apt-get install -y dos2unix && cp /setup_apache.sh /setup_apache_internal.sh && dos2unix /setup_apache_internal.sh && chmod +x /setup_apache_internal.sh && /setup_apache_internal.sh"

networks:
  webnet:
    driver: bridge

volumes:
  db_data:
