services:
  server:
    image: ubuntu:22.04
    container_name: server_container
    volumes:
      - ./www:/var/www/html/username
      - ./config/apache/000-default.conf:/000-default.conf
      - ./setup_apache.sh:/setup_apache.sh
      - ./init.sql:/init.sql
    working_dir: /var/www/html
    ports:
      - "3000:80"
      - "3306:3306"
    environment:
      DEBIAN_FRONTEND: noninteractive
    command: >
      /bin/bash -c "chmod +x /setup_apache.sh && /setup_apache.sh"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin_container
    environment:
      PMA_HOST: server
      PMA_USER: default_user
      PMA_PASSWORD: default_password
      UPLOAD_LIMIT: 64M
    ports:
      - "8181:80"
    depends_on:
      - server

volumes:
  db_data:
