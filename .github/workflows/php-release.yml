name: PHP Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build PHP App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1' # Specifica la versione di PHP necessaria
          extensions: mbstring, intl, pdo, pdo_mysql
          tools: composer

      - name: Install dependencies
        run: |
          cd www
          composer install --no-dev --optimize-autoloader

      - name: Run tests
        run: |
          cd www
          vendor/bin/phpunit

      - name: Prepare artifact
        run: |
          mkdir release
          cp -R www release/
          tar -czvf php-app.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: php-app
          path: php-app.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: php-app
          path: ./

      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            This is an automated release for version ${{ github.ref_name }}.
            
            Changelog:
            - Placeholder for release notes.
          draft: false
          prerelease: false
          files: php-app.tar.gz
