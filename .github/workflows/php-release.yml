name: PHP Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build PHP App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: ./actions/checkout # Azione locale per il checkout del codice

      - name: Setup PHP
        uses: ./actions/setup-php # Azione locale per configurare PHP
        with:
          php-version: '8.1'
          extensions: mbstring, intl, pdo, pdo_mysql
          tools: composer

      - name: Install dependencies
        run: |
          cd www
          composer install --no-dev --optimize-autoloader

      - name: Run tests
        run: |
          cd www
          vendor/bin/phpunit

      - name: Prepare artifact
        run: |
          mkdir release
          cp -R www release/
          tar -czvf php-app.tar.gz -C release .

      - name: Upload artifact
        uses: ./actions/upload-artifact # Azione locale per caricare artefatti
        with:
          name: php-app
          path: php-app.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: ./actions/download-artifact # Azione locale per scaricare artefatti
        with:
          name: php-app
          path: ./

      - name: Create release
        uses: ./actions/create-release # Azione locale per creare una release
        with:
          artifacts: php-app.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            This is an automated release for version ${{ github.ref_name }}.
            
            Changelog:
            - Placeholder for release notes.
