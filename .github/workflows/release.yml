name: Build and Release

on:
  push:
    branches:
      - main
      - develop
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-and-compile:
    name: Build and Compile Artifacts
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PHP and Composer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt-get update
          sudo apt-get install -y php8.1 php8.1-mbstring php8.1-intl php8.1-mysql
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer


      - name: Install dependencies
        run: |
          cd www
          composer install --no-dev --optimize-autoloader

      - name: Package PHP app
        run: |
          mkdir release
          cp -R www/* release/
          cp -f release/Config/config.template.php release/Config/config.php
          tar -czvf php-app.tar.gz -C release .

      - name: Upload PHP artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: php-app.tar.gz

      # Step 4: Prepare database artifact
      - name: Package database initialization script
        run: |
          mkdir db
          cp -f ./init.sql db/init.sql
          tar -czvf db-init-app.tar.gz -C db .

      - name: Upload DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-init-app
          path: db-init-app.tar.gz

      # Step 5: Compile LaTeX files
      - name: Compile LaTeX documents
        run: |
          cd docs
          mkdir -p output
          for tex_file in *.tex; do
            pdflatex -interaction=nonstopmode -output-directory output "$tex_file" || true
            pdflatex -interaction=nonstopmode -output-directory output "$tex_file" || true
          done

      - name: Upload LaTeX PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdf-artifacts
          path: docs/output/*.pdf

  release:
    name: Create GitHub Release
    needs: build-and-compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download PHP artifact
        uses: actions/download-artifact@v4
        with:
          name: php-app

      - name: Download DB artifact
        uses: actions/download-artifact@v4
        with:
          name: db-init-app

      - name: Download PDF artifacts
        uses: actions/download-artifact@v4
        with:
          name: pdf-artifacts

      - name: Get latest tag
        id: get_tag
        run: |
          TAG=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$TAG" >> $GITHUB_ENV

      - name: Calculate next version
        id: next_version
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          IFS='.' read -r major minor patch <<< "${latest_tag#v}"
          if [[ "$BRANCH_NAME" == "develop" ]]; then
            patch=$((patch + 1))
            next_version="v$major.$minor.$patch-dev"
          else
            patch=$((patch + 1))
            next_version="v$major.$minor.$patch"
          fi
          echo "next_version=$next_version" >> $GITHUB_ENV

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.next_version }} db-init-app.tar.gz php-app.tar.gz docs/output/*.pdf \
            --title "Release ${{ env.next_version }}" \
            --notes "Automated release for version ${{ env.next_version }}."
