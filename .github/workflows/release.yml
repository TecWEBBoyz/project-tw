name: PHP Build and Release

on:
  push:
    branches:
      - main
      - develop
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release PDF
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Compile LaTeX document using xu-cheng/latex-action
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@3.2.0
        with:
          root_file: docs/Relazione-TecWebBoyz.tex

      # Step 3: Upload the compiled PDF as an artifact
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v3
        with:
          name: Relazione-TecWebBoyz
          path: docs/Relazione-TecWebBoyz.pdf

      # Step 4: Create a release and attach the PDF
      - name: Create release with GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          RELEASE_NAME="Release $TAG_NAME"
          NOTES="Automated release for the PDF document."
          gh release create "$TAG_NAME" docs/Relazione-TecWebBoyz.pdf --title "$RELEASE_NAME" --notes "$NOTES"

