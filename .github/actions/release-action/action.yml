name: Release Action
description: Create a GitHub Release
inputs:
  artifacts:
    description: Path to the artifact to include in the release
    required: true
  token:
    description: GitHub token for authentication
    required: true
  tag:
    description: Tag for the release
    required: true
  name:
    description: Name of the release
    required: true
  body:
    description: Body of the release
    required: false
runs:
  using: "composite"
  steps:
    - name: Create GitHub Release
      run: |
        curl -X POST \
          -H "Authorization: token ${{ inputs.token }}" \
          -H "Content-Type: application/json" \
          -d '{
            "tag_name": "${{ inputs.tag }}",
            "name": "${{ inputs.name }}",
            "body": "${{ inputs.body }}",
            "prerelease": false
          }' \
          https://api.github.com/repos/${{ github.repository }}/releases
    - name: Upload Artifacts
      run: |
        curl -X POST \
          -H "Authorization: token ${{ inputs.token }}" \
          -H "Content-Type: application/zip" \
          --data-binary @${{ inputs.artifacts }} \
          https://uploads.github.com/repos/${{ github.repository }}/releases/assets?name=$(basename ${{ inputs.artifacts }})
